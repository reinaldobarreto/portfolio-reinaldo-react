<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swagger UI · NestJS Demo</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.18.2/swagger-ui.css" />
  <style>
    body { margin: 0; background: #0b1220; }
    .topbar { display: none !important; }
    .bar {
      display: flex; gap: 12px; align-items: center; justify-content: space-between;
      padding: 12px 18px; background: #121a2b; color: #e8eefc;
      font-family: Inter, system-ui, sans-serif; border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .bar a { color: #38bdf8; text-decoration: none; font-size: 0.9rem; margin-left: 10px; }
  </style>
</head>
<body>
  <div class="bar">
    <strong>Swagger (OpenAPI) · NestJS Demo</strong>
    <div>
      <a href="./">Demo</a>
      <a href="./redoc.html">Redoc</a>
    </div>
  </div>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5.18.2/swagger-ui-bundle.js"></script>
  <script>
    window.ui = SwaggerUIBundle({
      url: './openapi.json',
      dom_id: '#swagger-ui',
      presets: [SwaggerUIBundle.presets.apis],
      layout: 'BaseLayout',
    });
  </script>
</body>
</html>
